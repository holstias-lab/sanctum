<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nhoma — Vocabulary</title>
<script>(function(){try{var s=JSON.parse(localStorage.getItem('sanctum_state_v1')||'{}');document.documentElement.setAttribute('data-theme',(s.profile&&s.profile.theme)||'sage');}catch(e){}})();</script>
<link rel="stylesheet" href="assets/css/sanctum.css">
</head>
<body data-page="vocab">
<main class="main">
  <header class="page-header">
    <div>
      <h2 class="headline-lg">Vocabulary Bank</h2>
      <p class="body-md text-muted" id="vocab-sub"></p>
    </div>
    <div class="page-header-actions">
      <select id="lang-filter" class="btn btn-outline" style="background:var(--surface-container);border-color:rgba(141,147,135,.3)"></select>
      <button class="btn btn-primary" onclick="document.getElementById('add-form').classList.toggle('open')">+ Add Word</button>
    </div>
  </header>

  <div class="card mb-3" id="add-form" style="display:none">
    <div class="grid" style="gap:16px">
      <div class="col-4"><label class="label-sm text-muted">Language</label>
        <select id="in-lang" style="width:100%;padding:10px;border:1px solid rgba(141,147,135,.3);background:var(--surface-nested-low);color:var(--on-surface);margin-top:4px;border-radius:8px"></select>
      </div>
      <div class="col-8"><label class="label-sm text-muted">Search a word (English)</label>
        <div class="flex items-center gap-1 mt-1">
          <input id="dict-search-input" style="flex:1;padding:10px;border:1px solid rgba(141,147,135,.3);background:var(--surface-nested-low);color:var(--on-surface);border-radius:8px" placeholder="e.g. tree, hello, water" onkeydown="if(event.key==='Enter'){event.preventDefault();searchDictionaryWord();}">
          <button type="button" class="btn btn-outline btn-sm" onclick="searchDictionaryWord()">Search</button>
        </div>
      </div>
    </div>
    <p class="label-sm text-muted mt-1" id="dict-hint">Results from <a href="https://en.wiktionary.org" target="_blank" rel="noopener" class="text-primary-c">Wiktionary</a> &amp; <a href="https://commons.wikimedia.org" target="_blank" rel="noopener" class="text-primary-c">Wikimedia Commons</a> — free, openly-licensed, real pronunciations where available.</p>
    <div id="dict-results" style="display:none;margin-top:8px"></div>

    <p class="label-sm text-muted mt-3" style="cursor:pointer;text-decoration:underline;display:inline-block" onclick="toggleManualEntry()" id="manual-toggle">Can't find it? Enter manually</p>

    <div class="grid mt-2" id="manual-fields" style="gap:16px;display:none">
      <div class="col-4"><label class="label-sm text-muted">Word</label><input id="in-arabic" class="nested" style="width:100%;padding:10px;border:1px solid rgba(141,147,135,.3);background:var(--surface-nested-low);color:var(--on-surface);margin-top:4px" placeholder="e.g. hola, 你好, كَلِمَة"></div>
      <div class="col-4"><label class="label-sm text-muted">Transliteration</label><input id="in-translit" class="nested" style="width:100%;padding:10px;border:1px solid rgba(141,147,135,.3);background:var(--surface-nested-low);color:var(--on-surface);margin-top:4px" placeholder="How it sounds"></div>
      <div class="col-4"><label class="label-sm text-muted">Meaning</label><input id="in-meaning" class="nested" style="width:100%;padding:10px;border:1px solid rgba(141,147,135,.3);background:var(--surface-nested-low);color:var(--on-surface);margin-top:4px" placeholder="English meaning"></div>
      <div class="col-8"><label class="label-sm text-muted">Example / note</label><input id="in-example" style="width:100%;padding:10px;border:1px solid rgba(141,147,135,.3);background:var(--surface-nested-low);color:var(--on-surface);margin-top:4px;border-radius:8px" placeholder="Optional example sentence"></div>
      <div class="col-12">
        <label class="label-sm text-muted">Picture (optional)</label>
        <div class="flex items-center gap-1 mt-1">
          <input id="in-image-search" style="flex:1;padding:8px 12px;border-radius:8px;border:1px solid rgba(141,147,135,.3);background:var(--surface-nested-low);color:var(--on-surface)" placeholder="Search free photos, e.g. cat">
          <button type="button" class="btn btn-outline btn-sm" onclick="searchPhotos()">Search Photos</button>
          <span class="label-sm text-muted">or</span>
          <button type="button" class="btn btn-outline btn-sm" onclick="document.getElementById('in-image').click()">Upload Your Own</button>
          <input type="file" id="in-image" accept="image/*" style="display:none">
        </div>
        <p class="label-sm text-muted mt-1">Photo search powered by <a href="https://openverse.org" target="_blank" rel="noopener" class="text-primary-c">Openverse</a> — free, openly-licensed images.</p>
        <div id="photo-results" style="display:none;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:8px"></div>
        <div class="flex items-center gap-1 mt-2" id="chosen-image-row" style="display:none">
          <img id="in-image-preview" style="width:48px;height:48px;border-radius:8px;object-fit:cover">
          <span class="label-sm text-muted" id="in-image-name"></span>
          <span class="material-symbols-outlined" style="font-size:16px;cursor:pointer;color:var(--on-surface-variant)" onclick="clearChosenImage()">close</span>
        </div>
      </div>
    </div>
    <div class="flex gap-1 mt-2" id="save-row" style="display:none"><button class="btn btn-primary" onclick="addWord()">Save Word</button><button class="btn btn-ghost" onclick="document.getElementById('add-form').classList.remove('open')">Cancel</button></div>
  </div>

  <div id="vocab-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:var(--inner-gap)"></div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase-client.js"></script>
<script src="assets/js/auth.js"></script>
<script src="assets/js/state.js"></script>
<script src="assets/js/nav.js"></script>
<script src="assets/js/speech.js"></script>
<script src="assets/js/dictionary.js"></script>
<script>
const s = Sanctum.state;
let filterLang = 'all';
let pendingImage = null;
let pendingAudio = null;

document.getElementById('in-lang').innerHTML = s.languages.map(l => `<option value="${l.name}">${l.name}</option>`).join('');
document.getElementById('in-lang').addEventListener('change', () => { document.getElementById('dict-results').style.display = 'none'; });

document.getElementById('in-image').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const img = new Image();
  const reader = new FileReader();
  reader.onload = (ev) => { img.src = ev.target.result; };
  img.onload = () => {
    const size = 240;
    const canvas = document.createElement('canvas');
    canvas.width = size; canvas.height = size;
    const ctx = canvas.getContext('2d');
    const scale = Math.max(size / img.width, size / img.height);
    const w = img.width * scale, h = img.height * scale;
    ctx.drawImage(img, (size - w) / 2, (size - h) / 2, w, h);
    setChosenImage(canvas.toDataURL('image/jpeg', 0.8), file.name);
  };
  reader.readAsDataURL(file);
});

function setChosenImage(url, label) {
  pendingImage = url;
  document.getElementById('in-image-preview').src = url;
  document.getElementById('chosen-image-row').style.display = 'flex';
  document.getElementById('in-image-name').textContent = label;
  document.getElementById('photo-results').style.display = 'none';
}
function clearChosenImage() {
  pendingImage = null;
  document.getElementById('chosen-image-row').style.display = 'none';
  document.getElementById('in-image').value = '';
}

async function searchPhotos() {
  let query = document.getElementById('in-image-search').value.trim();
  if (!query) query = document.getElementById('in-meaning').value.trim();
  if (!query) { Sanctum.toast('Type something to search for'); return; }
  const grid = document.getElementById('photo-results');
  grid.style.display = 'grid';
  grid.innerHTML = '<p class="text-muted label-sm">Searching…</p>';
  try {
    const res = await fetch(`https://api.openverse.org/v1/images/?q=${encodeURIComponent(query)}&page_size=8`);
    const data = await res.json();
    const results = data.results || [];
    if (!results.length) { grid.innerHTML = '<p class="text-muted label-sm">No results — try a different word.</p>'; return; }
    grid.innerHTML = results.map(r => `
      <img src="${r.thumbnail}" style="width:100%;height:64px;object-fit:cover;border-radius:8px;cursor:pointer;border:2px solid transparent" onmouseover="this.style.borderColor='var(--primary)'" onmouseout="this.style.borderColor='transparent'" onclick="setChosenImage('${r.thumbnail.replace(/'/g,"\\'")}', 'Photo via Openverse')" title="${escapeHtml(r.title || 'Untitled')}">`).join('');
  } catch (e) {
    grid.innerHTML = '<p class="text-muted label-sm">Search failed — check your connection and try again.</p>';
  }
}

function uniqueLangs() {
  return Array.from(new Set(s.vocab.map(w => w.lang)));
}
function renderFilter() {
  const sel = document.getElementById('lang-filter');
  sel.innerHTML = `<option value="all">All languages</option>` + uniqueLangs().map(l => `<option value="${l}">${l}</option>`).join('');
  sel.value = filterLang;
}
document.getElementById('lang-filter').addEventListener('change', e => { filterLang = e.target.value; renderGrid(); });

function escapeHtml(str) {
  return String(str).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

function renderGrid() {
  document.getElementById('vocab-sub').textContent = `${s.vocab.length} words saved`;
  const grid = document.getElementById('vocab-grid');
  const words = filterLang === 'all' ? s.vocab : s.vocab.filter(w => w.lang === filterLang);
  grid.innerHTML = words.map(w => `
    <div class="word-card">
      ${w.image ? `<img src="${w.image}" style="width:100%;height:120px;object-fit:cover;border-radius:14px;margin-bottom:4px">` : ''}
      <div class="flex justify-between items-start">
        <span class="arabic" style="flex:1">${escapeHtml(w.arabic)}</span>
        <div class="flex items-center gap-1">
          <span class="material-symbols-outlined" style="font-size:18px;color:var(--primary);cursor:pointer" onclick="playWord('${w.id}')" title="Play pronunciation">volume_up</span>
          <span class="material-symbols-outlined" style="font-size:18px;color:var(--on-surface-variant);cursor:pointer" onclick="removeWord('${w.id}')">close</span>
        </div>
      </div>
      <div><h4>${escapeHtml(w.meaning)}</h4><p class="translit">${escapeHtml(w.translit)}</p></div>
      ${w.example ? `<p class="example">${escapeHtml(w.example)}</p>` : ''}
      <div class="flex justify-between items-center">
        <span class="badge badge-muted">${escapeHtml(w.lang.toUpperCase())}</span>
        <span class="label-sm text-muted">${w.mastery || 0}% mastered</span>
      </div>
      <input type="range" min="0" max="100" value="${w.mastery || 0}" oninput="Sanctum.setMastery('${w.id}', this.value); this.nextElementSibling && 0" onchange="renderGrid()" style="accent-color:var(--primary)">
    </div>`).join('') || `<p class="text-muted body-md">No words yet for this language — add one above.</p>`;
}

function toggleManualEntry() {
  const fields = document.getElementById('manual-fields');
  const showing = fields.style.display !== 'none';
  fields.style.display = showing ? 'none' : 'grid';
  document.getElementById('save-row').style.display = showing ? 'none' : 'flex';
  document.getElementById('manual-toggle').textContent = showing ? "Can't find it? Enter manually" : 'Hide manual entry';
}

async function searchDictionaryWord() {
  const query = document.getElementById('dict-search-input').value.trim();
  const lang = document.getElementById('in-lang').value;
  const results = document.getElementById('dict-results');
  if (!query) { Sanctum.toast('Type an English word to search'); return; }
  if (!DICTIONARY_LANG_CODE[lang]) {
    results.style.display = 'block';
    results.innerHTML = `<p class="text-muted body-md">Dictionary search isn't available for ${escapeHtml(lang)} — use manual entry below.</p>`;
    toggleManualEntry();
    return;
  }
  results.style.display = 'block';
  results.innerHTML = '<p class="text-muted label-sm">Searching…</p>';
  let data;
  try {
    data = await searchDictionary(query, lang);
  } catch (e) {
    results.innerHTML = '<p class="text-muted label-sm">Search failed — check your connection and try again.</p>';
    return;
  }
  if (data.error) {
    results.innerHTML = `<p class="text-muted label-sm">No Wiktionary entry found for "${escapeHtml(query)}".</p>`;
    return;
  }
  if (!data.results.length) {
    results.innerHTML = `<p class="text-muted label-sm">No ${escapeHtml(lang)} translation found for "${escapeHtml(query)}" — try a different word, or enter it manually below.</p>`;
    return;
  }
  results.innerHTML = data.results.map((r, i) => `
    <div class="flex items-center justify-between gap-1" style="padding:10px 12px;border:1px solid rgba(141,147,135,.2);border-radius:8px;margin-bottom:6px">
      <div>
        <span class="arabic" style="font-size:20px">${escapeHtml(r.word)}</span>
        ${r.translit ? `<span class="translit" style="margin-left:8px">${escapeHtml(r.translit)}</span>` : ''}
        ${r.gloss ? `<div class="label-sm text-muted">${escapeHtml(r.gloss)}</div>` : ''}
      </div>
      <div class="flex items-center gap-1">
        ${r.audio ? `<span class="material-symbols-outlined" style="font-size:18px;color:var(--primary);cursor:pointer" onclick="new Audio('${r.audio.replace(/'/g,"\\'")}').play()" title="Preview real pronunciation">volume_up</span>` : `<span class="label-sm text-muted" title="No recording found — will use synthesized audio">TTS only</span>`}
        <button type="button" class="btn btn-outline btn-sm" onclick="useDictResult(${i})">Use this</button>
      </div>
    </div>`).join('');
  window.__dictResults = data.results;
  window.__dictQuery = query;
}

function useDictResult(i) {
  const r = window.__dictResults[i];
  if (!r) return;
  document.getElementById('in-arabic').value = r.word;
  document.getElementById('in-translit').value = r.translit || '';
  document.getElementById('in-meaning').value = window.__dictQuery || '';
  pendingAudio = r.audio || null;
  const fields = document.getElementById('manual-fields');
  if (fields.style.display === 'none') toggleManualEntry();
  Sanctum.toast(pendingAudio ? 'Filled in — real pronunciation attached!' : 'Filled in — review and save');
}

function addWord() {
  const arabic = document.getElementById('in-arabic').value.trim();
  const translit = document.getElementById('in-translit').value.trim();
  const meaning = document.getElementById('in-meaning').value.trim();
  const lang = document.getElementById('in-lang').value;
  const example = document.getElementById('in-example').value.trim();
  if (!arabic || !meaning) { Sanctum.toast('Add at least a word and meaning'); return; }
  Sanctum.addWord({ arabic, translit, meaning, lang, example, image: pendingImage || null, audio: pendingAudio || null });
  const q = s.quests.find(q => q.id === 'q4');
  if (q && q.current < q.target) { q.current++; Sanctum.persist(); }
  Sanctum.addXP(5);
  document.getElementById('add-form').classList.remove('open');
  ['in-arabic','in-translit','in-meaning','in-example','in-image-search','dict-search-input'].forEach(id => document.getElementById(id).value = '');
  clearChosenImage();
  pendingAudio = null;
  document.getElementById('photo-results').style.display = 'none';
  document.getElementById('dict-results').style.display = 'none';
  document.getElementById('manual-fields').style.display = 'none';
  document.getElementById('save-row').style.display = 'none';
  document.getElementById('manual-toggle').textContent = "Can't find it? Enter manually";
  renderFilter();
  renderGrid();
}
function removeWord(id) {
  Sanctum.deleteWord(id);
  renderFilter();
  renderGrid();
}
function playWord(id) {
  const w = s.vocab.find(x => x.id === id);
  if (w) speakWord(w);
}

renderFilter();
renderGrid();
</script>
<style>#add-form.open{display:block !important}</style>
</body>
</html>
