<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nhoma — Vocabulary</title>
<script>(function(){try{var s=JSON.parse(localStorage.getItem('sanctum_state_v1')||'{}');document.documentElement.setAttribute('data-theme',(s.profile&&s.profile.theme)||'sage');}catch(e){}})();</script>
<link rel="stylesheet" href="assets/css/sanctum.css">
</head>
<body data-page="vocab">
<main class="main">
  <header class="page-header">
    <div>
      <h2 class="headline-lg">Vocabulary Bank</h2>
      <p class="body-md text-muted" id="vocab-sub"></p>
    </div>
    <div class="page-header-actions">
      <select id="lang-filter" class="btn btn-outline" style="background:var(--surface-container);border-color:rgba(141,147,135,.3)"></select>
      <button class="btn btn-primary" onclick="document.getElementById('add-form').classList.toggle('open')">+ Add Word</button>
    </div>
  </header>

  <div class="card mb-3" id="add-form" style="display:none">
    <div class="grid" style="gap:16px">
      <div class="col-3"><label class="label-sm text-muted">Word</label><input id="in-arabic" class="nested" style="width:100%;padding:10px;border:1px solid rgba(141,147,135,.3);background:var(--surface-nested-low);color:var(--on-surface);margin-top:4px" placeholder="e.g. hola, 你好, كَلِمَة"></div>
      <div class="col-3"><label class="label-sm text-muted">Transliteration</label><input id="in-translit" class="nested" style="width:100%;padding:10px;border:1px solid rgba(141,147,135,.3);background:var(--surface-nested-low);color:var(--on-surface);margin-top:4px" placeholder="How it sounds"></div>
      <div class="col-3"><label class="label-sm text-muted">Meaning</label><input id="in-meaning" class="nested" style="width:100%;padding:10px;border:1px solid rgba(141,147,135,.3);background:var(--surface-nested-low);color:var(--on-surface);margin-top:4px" placeholder="English meaning"></div>
      <div class="col-3"><label class="label-sm text-muted">Language</label>
        <select id="in-lang" style="width:100%;padding:10px;border:1px solid rgba(141,147,135,.3);background:var(--surface-nested-low);color:var(--on-surface);margin-top:4px;border-radius:8px"></select>
      </div>
      <div class="col-8"><label class="label-sm text-muted">Example / note</label><input id="in-example" style="width:100%;padding:10px;border:1px solid rgba(141,147,135,.3);background:var(--surface-nested-low);color:var(--on-surface);margin-top:4px;border-radius:8px" placeholder="Optional example sentence"></div>
      <div class="col-4">
        <label class="label-sm text-muted">Picture (optional)</label>
        <div class="flex items-center gap-1 mt-1">
          <button type="button" class="btn btn-outline btn-sm" onclick="document.getElementById('in-image').click()">Choose Image</button>
          <img id="in-image-preview" style="display:none;width:36px;height:36px;border-radius:8px;object-fit:cover">
          <span id="in-image-name" class="label-sm text-muted"></span>
        </div>
        <input type="file" id="in-image" accept="image/*" style="display:none">
      </div>
    </div>
    <div class="flex gap-1 mt-2"><button class="btn btn-primary" onclick="addWord()">Save Word</button><button class="btn btn-ghost" onclick="document.getElementById('add-form').classList.remove('open')">Cancel</button></div>
  </div>

  <div id="vocab-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:var(--inner-gap)"></div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase-client.js"></script>
<script src="assets/js/auth.js"></script>
<script src="assets/js/state.js"></script>
<script src="assets/js/nav.js"></script>
<script src="assets/js/speech.js"></script>
<script>
const s = Sanctum.state;
let filterLang = 'all';
let pendingImage = null;

document.getElementById('in-lang').innerHTML = s.languages.map(l => `<option value="${l.name}">${l.name}</option>`).join('');

document.getElementById('in-image').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const img = new Image();
  const reader = new FileReader();
  reader.onload = (ev) => { img.src = ev.target.result; };
  img.onload = () => {
    const size = 240;
    const canvas = document.createElement('canvas');
    canvas.width = size; canvas.height = size;
    const ctx = canvas.getContext('2d');
    const scale = Math.max(size / img.width, size / img.height);
    const w = img.width * scale, h = img.height * scale;
    ctx.drawImage(img, (size - w) / 2, (size - h) / 2, w, h);
    pendingImage = canvas.toDataURL('image/jpeg', 0.8);
    document.getElementById('in-image-preview').src = pendingImage;
    document.getElementById('in-image-preview').style.display = 'inline-block';
    document.getElementById('in-image-name').textContent = file.name;
  };
  reader.readAsDataURL(file);
});

function uniqueLangs() {
  return Array.from(new Set(s.vocab.map(w => w.lang)));
}
function renderFilter() {
  const sel = document.getElementById('lang-filter');
  sel.innerHTML = `<option value="all">All languages</option>` + uniqueLangs().map(l => `<option value="${l}">${l}</option>`).join('');
  sel.value = filterLang;
}
document.getElementById('lang-filter').addEventListener('change', e => { filterLang = e.target.value; renderGrid(); });

function escapeHtml(str) {
  return String(str).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

function renderGrid() {
  document.getElementById('vocab-sub').textContent = `${s.vocab.length} words saved`;
  const grid = document.getElementById('vocab-grid');
  const words = filterLang === 'all' ? s.vocab : s.vocab.filter(w => w.lang === filterLang);
  grid.innerHTML = words.map(w => `
    <div class="word-card">
      ${w.image ? `<img src="${w.image}" style="width:100%;height:120px;object-fit:cover;border-radius:14px;margin-bottom:4px">` : ''}
      <div class="flex justify-between items-start">
        <span class="arabic" style="flex:1">${escapeHtml(w.arabic)}</span>
        <div class="flex items-center gap-1">
          <span class="material-symbols-outlined" style="font-size:18px;color:var(--primary);cursor:pointer" onclick="speakText('${escapeHtml(w.arabic).replace(/'/g,"\\'")}', '${w.lang}')" title="Play pronunciation">volume_up</span>
          <span class="material-symbols-outlined" style="font-size:18px;color:var(--on-surface-variant);cursor:pointer" onclick="removeWord('${w.id}')">close</span>
        </div>
      </div>
      <div><h4>${escapeHtml(w.meaning)}</h4><p class="translit">${escapeHtml(w.translit)}</p></div>
      ${w.example ? `<p class="example">${escapeHtml(w.example)}</p>` : ''}
      <div class="flex justify-between items-center">
        <span class="badge badge-muted">${escapeHtml(w.lang.toUpperCase())}</span>
        <span class="label-sm text-muted">${w.mastery || 0}% mastered</span>
      </div>
      <input type="range" min="0" max="100" value="${w.mastery || 0}" oninput="Sanctum.setMastery('${w.id}', this.value); this.nextElementSibling && 0" onchange="renderGrid()" style="accent-color:var(--primary)">
    </div>`).join('') || `<p class="text-muted body-md">No words yet for this language — add one above.</p>`;
}

function addWord() {
  const arabic = document.getElementById('in-arabic').value.trim();
  const translit = document.getElementById('in-translit').value.trim();
  const meaning = document.getElementById('in-meaning').value.trim();
  const lang = document.getElementById('in-lang').value;
  const example = document.getElementById('in-example').value.trim();
  if (!arabic || !meaning) { Sanctum.toast('Add at least a word and meaning'); return; }
  Sanctum.addWord({ arabic, translit, meaning, lang, example, image: pendingImage || null });
  const q = s.quests.find(q => q.id === 'q4');
  if (q && q.current < q.target) { q.current++; Sanctum.persist(); }
  Sanctum.addXP(5);
  document.getElementById('add-form').classList.remove('open');
  ['in-arabic','in-translit','in-meaning','in-example'].forEach(id => document.getElementById(id).value = '');
  pendingImage = null;
  document.getElementById('in-image-preview').style.display = 'none';
  document.getElementById('in-image-name').textContent = '';
  renderFilter();
  renderGrid();
}
function removeWord(id) {
  Sanctum.deleteWord(id);
  renderFilter();
  renderGrid();
}

renderFilter();
renderGrid();
</script>
<style>#add-form.open{display:block !important}</style>
</body>
</html>
