<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Polyglot Sanctum</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap');
:root{--deep:#0f0d0a;--panel:#181410;--panel2:#201c16;--panel3:#28221a;--border:#332b1e;--border2:#4a3e2a;--gold:#c9a84c;--gold2:#8a6d2f;--glow:#e8c96a;--text:#d4c4a0;--muted:#7a6a4a;--dim:#4a3e28;--green:#4a7c4e;--sidebar:220px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--deep);color:var(--text);font-family:'Crimson Text',Georgia,serif;font-size:16px}
.hidden{display:none!important}

/* LOGIN */
#loginScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(rgba(0,0,0,0.75),rgba(0,0,0,0.9)),url('https://images.unsplash.com/photo-1481627834876-b7833e8f5570?w=1400&q=80') center/cover}
.login-box{text-align:center;padding:40px 20px;max-width:400px;width:100%}
.login-orn{color:var(--gold2);letter-spacing:10px;font-size:11px;margin-bottom:20px}
.login-img{width:130px;height:160px;object-fit:cover;border:3px solid var(--gold2);margin-bottom:20px;display:block;margin-left:auto;margin-right:auto}
.login-title{font-family:'Cinzel',serif;font-size:2.2em;color:var(--gold);letter-spacing:4px;margin-bottom:6px}
.login-sub{font-style:italic;color:var(--muted);margin-bottom:28px}
.login-line{width:240px;height:1px;background:linear-gradient(90deg,transparent,var(--border2),transparent);margin:0 auto 28px}
.pass-input{width:280px;background:rgba(24,20,16,0.95);border:1px solid var(--border2);color:var(--text);padding:12px 16px;font-family:'Crimson Text',serif;font-size:1em;border-radius:2px;margin-bottom:12px;text-align:center;letter-spacing:2px;outline:none;display:block;margin-left:auto;margin-right:auto}
.pass-input:focus{border-color:var(--gold2)}
.login-err{color:#c05050;font-size:0.85em;margin-top:8px;min-height:20px;font-style:italic}

/* APP */
#app{display:flex;height:100vh;overflow:hidden}

/* SIDEBAR */
.sidebar{width:var(--sidebar);background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.sb-hero{height:100px;background:linear-gradient(rgba(0,0,0,0.4),rgba(0,0,0,0.7)),url('https://images.unsplash.com/photo-1578662996442-48f60103fc96?w=400&q=80') center/cover;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:10px;flex-shrink:0}
.sb-moon{font-size:1.5em}
.sb-title{font-family:'Cinzel',serif;font-size:0.6em;letter-spacing:4px;color:var(--gold);text-transform:uppercase}
.nav-sec{padding:14px 16px 4px;font-family:'Cinzel',serif;font-size:0.52em;letter-spacing:4px;color:var(--gold2);text-transform:uppercase}
.nav-a{display:flex;align-items:center;gap:10px;padding:9px 18px;color:var(--muted);cursor:pointer;font-size:0.88em;border-left:2px solid transparent;transition:all 0.15s;text-decoration:none;width:100%}
.nav-a:hover{color:var(--text);background:var(--panel2)}
.nav-a.on{color:var(--gold);border-left-color:var(--gold);background:var(--panel2)}
.sb-leave{margin:auto 0 16px;background:transparent;border:1px solid var(--border2);color:var(--muted);font-family:'Cinzel',serif;font-size:0.6em;letter-spacing:2px;padding:7px 14px;cursor:pointer;text-transform:uppercase;border-radius:2px;align-self:center;transition:all 0.18s}
.sb-leave:hover{border-color:var(--gold2);color:var(--gold)}

/* CONTENT */
.content{flex:1;overflow-y:auto;background:var(--deep)}
.content::-webkit-scrollbar{width:4px}
.content::-webkit-scrollbar-thumb{background:var(--border2)}

/* PAGES */
.page{display:none;animation:fadeIn 0.3s ease}
.page.on{display:block}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes xpFloat{0%{opacity:1;transform:translateY(0) translateX(-50%)}100%{opacity:0;transform:translateY(-70px) translateX(-50%)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

.cover{width:100%;height:160px;background-size:cover!important;background-position:center!important}
.pi{padding:24px 32px 60px}

/* PAGE HEADER */
.ph{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.pt{font-family:'Cinzel',serif;font-size:1.4em;color:var(--gold);letter-spacing:3px;font-weight:400}
.ps{font-style:italic;color:var(--muted);font-size:0.9em;margin-top:4px}

/* BUTTONS */
.btn{background:transparent;border:1px solid var(--gold2);color:var(--gold);font-family:'Cinzel',serif;font-size:0.68em;letter-spacing:2px;padding:9px 18px;cursor:pointer;text-transform:uppercase;border-radius:2px;transition:all 0.18s}
.btn:hover{background:var(--gold2);color:var(--deep)}
.btn.sm{padding:6px 12px;font-size:0.6em}
.btn.ghost{border-color:var(--border2);color:var(--muted)}
.btn.ghost:hover{border-color:var(--gold2);color:var(--gold)}

/* SECTION HEADING */
.sh{background:#1e1810;border-left:3px solid var(--gold2);padding:8px 14px;margin:24px 0 12px;font-style:italic;color:var(--text);font-size:1em}

/* CALLOUT */
.co{background:var(--panel2);border-left:3px solid var(--gold2);border-radius:2px;padding:16px 18px;margin-bottom:14px;animation:fadeUp 0.4s ease}
.co-icon{font-size:1.2em;margin-bottom:5px;display:block}
.co-title{font-family:'Cinzel',serif;font-size:0.65em;letter-spacing:3px;color:var(--gold2);text-transform:uppercase;margin-bottom:8px}
.co-body{font-size:0.9em;line-height:1.8}
.co-body b{color:var(--gold)}
.arrow{color:var(--gold2)}

/* DASHBOARD */
.dash-cols{display:grid;grid-template-columns:260px 1fr;gap:18px;align-items:start}
.dash-l{display:flex;flex-direction:column;gap:12px}
.dash-r{display:flex;flex-direction:column;gap:18px}
.dash-block{position:relative}
.dash-block[draggable="true"]{cursor:grab}
.dash-block[draggable="true"]:hover{outline:1px dashed var(--border2);outline-offset:4px}
.dash-block.dragging{opacity:0.35}
.drag-handle{position:absolute;top:6px;right:8px;color:var(--muted);cursor:grab;font-size:15px;z-index:2;padding:2px 5px;line-height:1;user-select:none}
.drag-handle:hover{color:var(--gold)}
.portrait-wrap{width:150px;margin:0 auto 12px;display:block}
.portrait-img{width:150px;height:180px;object-fit:cover;border:3px solid var(--gold2);box-shadow:0 0 0 1px var(--dim),0 8px 28px rgba(0,0,0,0.6);display:block;cursor:pointer}
.p-name{text-align:center;font-family:'Cinzel',serif;font-size:0.75em;letter-spacing:3px;color:var(--gold);text-transform:uppercase;margin-top:6px;cursor:pointer}
.p-rank{text-align:center;font-family:'Cinzel',serif;font-size:0.85em;color:var(--glow);margin-bottom:4px}
.p-rankn{text-align:center;font-size:0.72em;color:var(--muted);margin-bottom:14px}
.xp-labels{display:flex;justify-content:space-between;font-size:0.78em;color:var(--muted);margin-bottom:5px}
.xp-bg{height:8px;background:var(--deep);border:1px solid var(--border2);border-radius:1px;overflow:hidden;margin-bottom:4px}
.xp-fill{height:100%;background:linear-gradient(90deg,var(--gold2),var(--glow));transition:width 0.8s ease;box-shadow:0 0 8px rgba(201,168,76,0.3);width:0%}
.xp-next{font-size:0.75em;color:var(--muted);font-style:italic;margin-bottom:14px}
.stats-row{display:flex;border:1px solid var(--border);border-radius:2px;overflow:hidden}
.sbox{flex:1;text-align:center;padding:10px 4px;border-right:1px solid var(--border)}
.sbox:last-child{border-right:none}
.sv{font-family:'Cinzel',serif;font-size:1.4em;color:var(--glow);display:block}
.sl{font-size:0.6em;color:var(--muted);letter-spacing:1px;text-transform:uppercase}

/* STREAK */
.sdots{display:flex;gap:6px;margin-top:6px;justify-content:center;flex-wrap:wrap}
.sdot{width:30px;height:30px;border-radius:50%;background:var(--panel3);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:0.58em;color:var(--muted);font-family:'Cinzel',serif;transition:all 0.2s}
.sdot.lit{background:#6b2e00;border-color:#c4680a;color:#ffb347;box-shadow:0 0 8px rgba(196,104,10,0.4)}
.sdot.today{outline:2px solid var(--gold);outline-offset:2px}
.dash-clock{font-family:'Cinzel',serif;color:var(--gold);font-size:0.85em;letter-spacing:1px;margin-top:2px}

/* RANK LADDER */
.rrow{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid rgba(51,43,30,0.6);font-size:0.83em}
.rrow:last-child{border-bottom:none}
.rdot{width:6px;height:6px;border-radius:50%;background:var(--dim);flex-shrink:0}
.rdot.done{background:var(--gold)}
.rdot.now{background:var(--glow);box-shadow:0 0 5px var(--glow);animation:pulse 2s infinite}
.rrow.now .rlabel{color:var(--gold)}
.rrow.done .rlabel{color:var(--muted)}
.rrow.future .rlabel{color:var(--dim)}
.rnum{width:20px;color:var(--muted);font-size:0.78em}
.rlabel{flex:1}
.rxp{color:var(--gold2);font-size:0.72em}

/* LANG GRID */
.lang-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.lang-item{position:relative;background:var(--panel3);border:1px solid var(--border);border-radius:2px;padding:9px 4px;text-align:center;transition:all 0.18s;cursor:pointer}
.lang-item.active{border-color:var(--gold2)}
.lang-item.locked{opacity:0.28}
.lang-item.lang-add{display:flex;flex-direction:column;align-items:center;justify-content:center;border-style:dashed;opacity:0.6}
.lang-item.lang-add:hover{opacity:1;border-color:var(--gold2)}
.lang-del{position:absolute;top:1px;right:2px;background:transparent;border:none;color:var(--dim);cursor:pointer;font-size:0.65em;line-height:1;padding:2px}
.lang-del:hover{color:#c05050}
.lf{font-size:1.3em;margin-bottom:2px}
.ln{font-size:0.58em;color:var(--gold);letter-spacing:0.5px;text-transform:uppercase}
.lst{font-size:0.55em;color:var(--muted);margin-top:1px}
.lbar{height:2px;background:var(--deep);margin-top:5px;overflow:hidden}
.lbar-fill{height:100%;background:var(--gold2)}

/* QUEST PREVIEW */
.qpi{display:flex;align-items:center;gap:9px;padding:7px 0;border-bottom:1px solid var(--border);font-size:0.84em}
.qpi:last-child{border-bottom:none}
.qpi-n{flex:1;color:var(--text)}
.qpi-x{color:var(--gold2);font-size:0.78em}
.see-all{display:block;margin-top:10px;font-size:0.76em;color:var(--gold2);cursor:pointer;font-style:italic}
.see-all:hover{color:var(--gold)}

/* RITUAL */
.rit-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);cursor:pointer;font-size:0.85em;transition:color 0.15s}
.rit-item:last-child{border-bottom:none}
.rit-item:hover{color:var(--gold)}
.rchk{width:15px;height:15px;border:1px solid var(--gold2);border-radius:2px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
.rchk.on{background:var(--gold2)}
.rchk.on::after{content:'✓';color:var(--deep);font-size:10px}
.rit-item.done{color:var(--muted);text-decoration:line-through}

/* POMODORO */
.pom-wrap{display:flex;flex-direction:column;align-items:center;gap:20px;padding:20px 0}
.pom-modes{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.pom-mode-btn{background:var(--panel2);border:1px solid var(--border2);color:var(--muted);font-family:'Cinzel',serif;font-size:0.62em;letter-spacing:1px;padding:8px 14px;cursor:pointer;border-radius:2px;transition:all 0.18s}
.pom-mode-btn:hover,.pom-mode-btn.active{border-color:var(--gold2);color:var(--gold);background:var(--panel3)}
.pom-ring-wrap{position:relative;width:210px;height:210px;display:flex;align-items:center;justify-content:center}
.pom-svg{position:absolute;top:0;left:0;width:100%;height:100%}
.pom-center{text-align:center;z-index:1}
.pom-mlabel{font-size:0.68em;color:var(--gold2);letter-spacing:2px;text-transform:uppercase;margin-bottom:4px}
.pom-disp{font-family:'Cinzel',serif;font-size:2.6em;color:var(--gold);letter-spacing:2px;text-shadow:0 0 20px rgba(201,168,76,0.3)}
.pom-cyc{font-size:0.72em;color:var(--muted);margin-top:3px}
.pom-btns{display:flex;gap:10px}
.pom-start{background:transparent;border:1px solid var(--gold);color:var(--gold);font-family:'Cinzel',serif;font-size:0.75em;letter-spacing:2px;padding:11px 26px;cursor:pointer;border-radius:2px;transition:all 0.2s;text-transform:uppercase}
.pom-start:hover{background:var(--gold);color:var(--deep)}
.pom-reset{background:transparent;border:1px solid var(--border2);color:var(--muted);font-family:'Cinzel',serif;font-size:0.7em;letter-spacing:2px;padding:11px 18px;cursor:pointer;border-radius:2px;transition:all 0.2s;text-transform:uppercase}
.pom-reset:hover{border-color:var(--gold2);color:var(--gold)}

/* QUESTS */
.qsec-title{font-family:'Cinzel',serif;font-size:0.65em;letter-spacing:4px;color:var(--gold2);text-transform:uppercase;margin:20px 0 10px;display:flex;align-items:center;gap:10px}
.qsec-title::after{content:'';flex:1;height:1px;background:var(--border)}
.qcard{background:var(--panel);border:1px solid var(--border);border-radius:2px;padding:13px 16px;display:flex;align-items:center;gap:13px;margin-bottom:7px;cursor:pointer;transition:all 0.18s}
.qcard:hover:not(.locked):not(.done){border-color:var(--gold2);background:var(--panel2);transform:translateY(-1px)}
.qcard.locked{opacity:0.3;cursor:not-allowed}
.qcard.done{border-color:var(--green);opacity:0.55}
.q-ico{font-size:1.2em;width:28px;text-align:center;flex-shrink:0}
.q-info{flex:1}
.q-name{color:var(--gold);font-size:0.88em;letter-spacing:1px;margin-bottom:2px}
.q-desc{color:var(--muted);font-size:0.78em;font-style:italic}
.q-badge{display:inline-block;font-size:0.58em;padding:1px 5px;border:1px solid var(--border2);color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-top:3px;border-radius:2px}
.q-xp{color:var(--gold2);font-size:0.78em;font-family:'Cinzel',serif;white-space:nowrap}

/* VOCAB */
.filter-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.fsel,.finp{background:var(--panel2);border:1px solid var(--border2);color:var(--text);padding:8px 11px;border-radius:2px;font-family:'Crimson Text',serif;font-size:0.9em;outline:none;transition:border-color 0.18s}
.fsel:focus,.finp:focus{border-color:var(--gold2)}
.finp{flex:1;min-width:140px}
.vocab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.wcard{background:var(--panel);border:1px solid var(--border);border-radius:2px;padding:14px;position:relative;animation:fadeUp 0.3s ease}
.wcard:hover{border-color:var(--border2)}
.w-arabic{font-size:1.7em;color:var(--gold);margin-bottom:4px;direction:rtl;line-height:1.3}
.w-meaning{font-size:0.9em;color:var(--text);margin-bottom:2px}
.w-pronun{font-size:0.78em;color:var(--muted);font-style:italic}
.w-badges{margin-top:8px;display:flex;gap:4px;flex-wrap:wrap}
.wbadge{font-size:0.58em;padding:2px 6px;border:1px solid var(--border2);color:var(--muted);letter-spacing:1px;text-transform:uppercase;border-radius:2px}
.m-New{background:rgba(74,124,78,0.15);color:#6ab56e;border-color:rgba(74,124,78,0.3)}
.m-Learning{background:rgba(201,168,76,0.1);color:var(--gold);border-color:rgba(201,168,76,0.3)}
.m-Reviewing{background:rgba(180,100,20,0.15);color:#d4820a;border-color:rgba(180,100,20,0.3)}
.m-Mastered{background:rgba(100,50,150,0.15);color:#b088d0;border-color:rgba(100,50,150,0.3)}
.w-del{position:absolute;top:8px;right:8px;background:transparent;border:none;color:var(--dim);cursor:pointer;font-size:0.85em;transition:color 0.15s}
.w-del:hover{color:#c05050}
.empty{text-align:center;padding:60px 20px;color:var(--muted);font-style:italic}
.empty .big{font-size:2em;margin-bottom:10px}

/* FLASHCARDS */
.fc-area{display:flex;flex-direction:column;align-items:center;padding:20px 0}
.fc-empty{color:var(--muted);font-style:italic;text-align:center;padding:60px}
.fc-wrap{width:100%;max-width:460px}
.fc-prog{color:var(--muted);font-size:0.78em;text-align:center;margin-bottom:14px;letter-spacing:1px}
.fc-card{background:var(--panel);border:1px solid var(--border2);border-radius:2px;padding:46px 32px;text-align:center;min-height:210px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all 0.25s;margin-bottom:16px;position:relative;overflow:hidden}
.fc-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold2),transparent)}
.fc-card:hover{border-color:var(--gold2)}
.fc-hint{font-size:0.65em;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px}
.fc-word{font-size:2.2em;color:var(--gold);margin-bottom:8px;line-height:1.2}
.fc-meaning{font-size:1.1em;color:var(--text);display:none}
.fc-pronun{font-size:0.82em;color:var(--muted);font-style:italic;display:none;margin-top:5px}
.fc-card.flipped .fc-meaning,.fc-card.flipped .fc-pronun{display:block}
.fc-card.flipped .fc-hint{display:none}
.fc-btns{display:flex;gap:10px}
.fc-btn{flex:1;padding:10px;border:1px solid var(--border2);background:transparent;color:var(--text);font-family:'Cinzel',serif;font-size:0.62em;letter-spacing:2px;text-transform:uppercase;cursor:pointer;border-radius:2px;transition:all 0.18s}
.fc-btn.wrong{border-color:#7c2a2a;color:#c05050}
.fc-btn.wrong:hover{background:rgba(124,42,42,0.2)}
.fc-btn.right{border-color:var(--green);color:#6ab56e}
.fc-btn.right:hover{background:rgba(74,124,78,0.2)}
.fc-done{text-align:center;padding:40px;color:var(--text)}
.fc-done .big{font-size:2em;color:var(--gold);margin-bottom:12px;display:block}

/* QURAN */
.q-stats{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.qstat{background:var(--panel);border:1px solid var(--border);border-radius:2px;padding:12px 16px;text-align:center;flex:1;min-width:80px}
.qstat-v{font-family:'Cinzel',serif;font-size:1.6em;color:var(--gold);display:block}
.qstat-l{font-size:0.62em;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
.surah-card{background:var(--panel);border:1px solid var(--border);border-radius:2px;padding:11px 15px;margin-bottom:5px;display:flex;align-items:center;gap:12px;transition:all 0.18s}
.surah-card:hover{border-color:var(--border2);background:var(--panel2)}
.s-num{font-family:'Cinzel',serif;font-size:0.7em;color:var(--gold2);width:26px;text-align:center;flex-shrink:0}
.s-info{flex:1}
.s-name{color:var(--gold);font-size:0.87em;letter-spacing:0.5px}
.s-arabic{font-size:1em;color:var(--text);direction:rtl}
.s-meta{font-size:0.7em;color:var(--muted)}
.s-checks{display:flex;gap:8px}
.schk{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer}
.schk-box{width:20px;height:20px;border:1px solid var(--border2);border-radius:2px;display:flex;align-items:center;justify-content:center;transition:all 0.18s;font-size:11px;color:transparent}
.schk-box.on{background:var(--gold2);border-color:var(--gold);color:var(--deep)}
.schk-lbl{font-size:0.5em;color:var(--muted);letter-spacing:0.5px;text-transform:uppercase;white-space:nowrap}

/* QURAN READER */
.qr-layout{display:flex;gap:0;height:calc(100vh - 64px);margin:-16px;overflow:hidden}
.qr-side{width:270px;flex-shrink:0;border-right:1px solid var(--border);overflow-y:auto;background:var(--panel)}
.qr-side::-webkit-scrollbar{width:4px}
.qr-side::-webkit-scrollbar-thumb{background:var(--border2)}
.qr-side-item{display:flex;align-items:center;gap:10px;padding:9px 16px;cursor:pointer;border-left:2px solid transparent;transition:all 0.15s}

// ── CALENDAR / STREAK ──
function dkey(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function getWeekDates(){
  const now=new Date(),dow=now.getDay(),mondayOffset=dow===0?-6:1-dow;
  const monday=new Date(now);monday.setDate(now.getDate()+mondayOffset);
  const dates=[];
  for(let i=0;i<7;i++){const d=new Date(monday);d.setDate(monday.getDate()+i);dates.push(d);}
  return dates;
}
function computeStreak(){
  let streak=0,d=new Date();
  if(!S.loggedDates.includes(dkey(d)))d.setDate(d.getDate()-1);
  while(S.loggedDates.includes(dkey(d))){streak++;d.setDate(d.getDate()-1);}
  return streak;
}
function updateClock(){
  const el=document.getElementById('dashClock');
  if(!el)return;
  el.textContent=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
}

// ── INIT ──
async function init(){
  await loadAll();
  applyCustom();
  go('dashboard');
}

async function loadAll(){
  // Load main state
  try{
    const {data}=await sb.from('sanctum_state').select('*').eq('key','main').single();
    if(data){
      const sv=JSON.parse(data.value);
      if(sv.xp!==undefined)S.xp=sv.xp;
      if(sv.lastLog!==undefined)S.lastLog=sv.lastLog;
      if(sv.loggedDates)S.loggedDates=sv.loggedDates;
      else if(sv.lastLog){const d=new Date(sv.lastLog);if(!isNaN(d))S.loggedDates=[dkey(d)];}
      S.streak=computeStreak();
      if(sv.ritual)S.ritual=sv.ritual;
      if(sv.ritualDate)S.ritualDate=sv.ritualDate;
      if(sv.completedQuests)S.completedQuests=sv.completedQuests;
      if(sv.quranProgress)S.quranProgress=sv.quranProgress;
      if(sv.tajweedMastered)S.tajweedMastered=sv.tajweedMastered;
      if(sv.quranAnnotations)S.quranAnnotations=sv.quranAnnotations;
      if(sv.c){
        S.c={...S.c,...sv.c};
        if(sv.c.quests)S.c.quests=sv.c.quests;
        if(sv.c.ritual)S.c.ritual=sv.c.ritual;
      }
    }
  }catch(e){console.log('state load:',e);}

  // Load words
  try{
    const {data,error}=await sb.from('sanctum_words').select('*').order('created_at',{ascending:false});
    if(!error&&data&&data.length>0){
      S.words=data;
    } else if(!error&&data&&data.length===0){
      try{
        const {data:ins}=await sb.from('sanctum_words').insert(DEFAULT_WORDS).select();
        if(ins)S.words=ins;
        else S.words=DEFAULT_WORDS.map((w,i)=>({...w,id:'tmp'+i,created_at:new Date().toISOString()}));
      }catch(e2){
        S.words=DEFAULT_WORDS.map((w,i)=>({...w,id:'tmp'+i,created_at:new Date().toISOString()}));
      }
    } else {
      S.words=DEFAULT_WORDS.map((w,i)=>({...w,id:'tmp'+i,created_at:new Date().toISOString()}));
    }
  }catch(e){
    console.log('words:',e);
    S.words=DEFAULT_WORDS.map((w,i)=>({...w,id:'tmp'+i,created_at:new Date().toISOString()}));
  }

  // Load sessions
  try{const {data,error}=await sb.from('sanctum_sessions').select('*').order('created_at',{ascending:false});if(!error&&data)S.sessions=data;}catch(e){}
  // Load resources
  try{const {data,error}=await sb.from('sanctum_resources').select('*').order('created_at',{ascending:false});if(!error&&data)S.resources=data;}catch(e){}
}

async function save(){
  const payload={
    xp:S.xp,streak:S.streak,lastLog:S.lastLog,loggedDates:S.loggedDates,
    ritual:S.ritual,ritualDate:S.ritualDate,

    quranProgress:S.quranProgress,

}

  try{

function wrapBlock(col,idx,html){
  return `<div class="dash-block" data-col="${col}" data-idx="${idx}" draggable="${!!editMode}"
    ondragstart="dragBlockStart(event)" ondragover="dragBlockOver(event)" ondrop="dragBlockDrop(event)" ondragend="dragBlockEnd(event)">
    ${editMode?'<div class="drag-handle" title="Drag to reorder">⠿</div>':''}
    ${html||''}
  </div>`;
}
let dragBlockInfo=null;
function dragBlockStart(e){
  const t=e.currentTarget;
  dragBlockInfo={col:t.dataset.col,idx:parseInt(t.dataset.idx)};
  e.dataTransfer.effectAllowed='move';
  t.classList.add('dragging');
}
function dragBlockOver(e){e.preventDefault();e.dataTransfer.dropEffect='move';}
async function dragBlockDrop(e){
  e.preventDefault();
  const t=e.currentTarget,col=t.dataset.col,idx=parseInt(t.dataset.idx);
  if(!dragBlockInfo||dragBlockInfo.col!==col||dragBlockInfo.idx===idx)return;
  const key=col==='left'?'dashLeftOrder':'dashRightOrder';
  const arr=S.c[key];
  const [moved]=arr.splice(dragBlockInfo.idx,1);
  arr.splice(idx,0,moved);
  dragBlockInfo=null;
  await save();go('dashboard');
}
function dragBlockEnd(e){e.currentTarget.classList.remove('dragging');dragBlockInfo=null;}

async function toggleRitual(i){
  if(S.ritual.includes(i))S.ritual=S.ritual.filter(x=>x!==i);
  else{S.ritual.push(i);snd('click');if(S.ritual.length===S.c.ritual.length){toast('✦ Daily ritual complete!');snd('quest');}}
  await save();
  const rc=document.getElementById('ritualContainer');
  if(rc){
    const rdate=new Date().toDateString();
    rc.innerHTML=S.c.ritual.map((r,idx)=>{
      const on=S.ritual.includes(idx);
      return `<div class="rit-item ${on?'done':''}" onclick="toggleRitual(${idx})">
        <div class="rchk ${on?'on':''}"></div><span>${r}</span></div>`;
    }).join('');
  }
}

async function logToday(){
  const key=dkey(new Date());
  if(S.loggedDates.includes(key)){toast('Already logged today!');return;}
  S.loggedDates.push(key);
  S.lastLog=new Date().toDateString();

// ── POMODORO ──
function renderPomodoro(el){
  const secs=pomSecs||(pomMode==='work'?POM_WORK:pomMode==='short'?POM_SHORT:POM_LONG);
  const m=String(Math.floor(secs/60)).padStart(2,'0'),s=String(secs%60).padStart(2,'0');
  const total=pomMode==='work'?POM_WORK:pomMode==='short'?POM_SHORT:POM_LONG;
  const pct=pomSecs?pomSecs/total:1;
  const circ=2*Math.PI*54,offset=circ*pct;
  const modeLabel=pomMode==='work'?'🍅 Focus Time':pomMode==='short'?'☕ Short Break':'🌙 Long Break';

  el.innerHTML=`
    <div class="pi" style="padding-top:32px">
      <div class="ph">
        <div><div class="pt">🍅 Focus Timer</div><div class="ps">Study in sprints — XP auto-awards when the timer ends</div></div>
      </div>
      <div class="pom-wrap">
        <div class="pom-modes">
          <button class="pom-mode-btn ${pomMode==='work'?'active':''}" onclick="setPomMode('work')">🍅 Focus (25m)</button>
          <button class="pom-mode-btn ${pomMode==='short'?'active':''}" onclick="setPomMode('short')">☕ Short Break (5m)</button>
          <button class="pom-mode-btn ${pomMode==='long'?'active':''}" onclick="setPomMode('long')">🌙 Long Break (15m)</button>
        </div>
        <div class="pom-ring-wrap">
          <svg class="pom-svg" viewBox="0 0 120 120">
            <circle cx="60" cy="60" r="54" fill="none" stroke="var(--border)" stroke-width="6"/>
            <circle id="pomRing" cx="60" cy="60" r="54" fill="none" stroke="var(--gold)" stroke-width="6"
              stroke-linecap="round" stroke-dasharray="${circ.toFixed(1)}" stroke-dashoffset="${offset.toFixed(1)}"
              transform="rotate(-90 60 60)" style="transition:stroke-dashoffset 1s linear"/>
          </svg>
          <div class="pom-center">
            <div class="pom-mlabel" id="pomModeLabel">${modeLabel}</div>
            <div class="pom-disp" id="pomDisp">${m}:${s}</div>
            <div class="pom-cyc">Cycles: ${pomCycles}</div>
          </div>
        </div>
        <div class="pom-btns">
          <button class="pom-start" id="pomStartBtn" onclick="${pomRunning?'pausePom()':'startPom()'}">${pomRunning?'⏸ Pause':'▶ Start'}</button>
          <button class="pom-reset" onclick="resetPom()">↺ Reset</button>
        </div>
        <div style="width:100%;max-width:400px">
          <div class="co">
            <div class="co-title">Session Settings</div>
            <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:6px">
              <div style="flex:1"><label class="mlabel">Language</label>
                <select id="pomLang" class="fsel" style="width:100%">${langOptions()}</select>
              </div>
              <div style="flex:1"><label class="mlabel">Type</label>
                <select id="pomType" class="fsel" style="width:100%"><option>Study</option><option>Vocabulary</option><option>Reading</option><option>Quran Recitation</option><option>Tajweed</option><option>Grammar</option></select>
              </div>
            </div>
            <p style="font-size:0.8em;color:var(--muted);margin-top:10px;font-style:italic">✦ When Focus ends, <b style="color:var(--gold)">+25 XP is automatically added</b> and your session is logged.</p>
          </div>
        </div>
      </div>
    </div>`;
}

function setPomMode(mode){
  if(pomRunning)return;
  pomMode=mode;
  pomSecs=mode==='work'?POM_WORK:mode==='short'?POM_SHORT:POM_LONG;
  go('pomodoro');
}
function startPom(){
  if(pomRunning)return;
  if(!pomSecs)pomSecs=pomMode==='work'?POM_WORK:pomMode==='short'?POM_SHORT:POM_LONG;
  pomRunning=true;snd('click');
  const btn=document.getElementById('pomStartBtn');
  if(btn){btn.textContent='⏸ Pause';btn.onclick=pausePom;}
  pomTimer=setInterval(pomTick,1000);
}
function pausePom(){
  clearInterval(pomTimer);pomRunning=false;
  const btn=document.getElementById('pomStartBtn');
  if(btn){btn.textContent='▶ Resume';btn.onclick=startPom;}
}
function resetPom(){
  clearInterval(pomTimer);pomRunning=false;pomSecs=0;pomMode='work';pomCycles=0;
  go('pomodoro');
}
async function pomTick(){
  pomSecs--;
  // Update display
  const m=String(Math.floor(pomSecs/60)).padStart(2,'0'),s=String(pomSecs%60).padStart(2,'0');
  const d=document.getElementById('pomDisp');if(d)d.textContent=m+':'+s;
  const total=pomMode==='work'?POM_WORK:pomMode==='short'?POM_SHORT:POM_LONG;
  const ring=document.getElementById('pomRing');
  if(ring){const circ=2*Math.PI*54;ring.style.strokeDashoffset=(circ*(pomSecs/total)).toFixed(1);}

  if(pomSecs<=0){
    clearInterval(pomTimer);pomRunning=false;snd('timer');
    if(pomMode==='work'){
      pomCycles++;
      S.xp+=25;todayXP+=25;
      await save();
      xpPop('+25 XP',window.innerWidth/2,200);
      toast('🍅 Session complete! +25 XP earned!');
      // Auto-log
      try{
        const lang=document.getElementById('pomLang')?.value||'Arabic';
        const type=document.getElementById('pomType')?.value||'Study';
        const {data}=await sb.from('sanctum_sessions').insert([{title:'Pomodoro Session #'+pomCycles,language:lang,duration_label:'25 minutes',type:type,notes:'Auto-logged via Pomodoro timer',xp_earned:25}]).select();
        if(data)S.sessions.unshift(data[0]);
      }catch(e){}
      pomMode=pomCycles%4===0?'long':'short';
      pomSecs=pomCycles%4===0?POM_LONG:POM_SHORT;
      const ml=document.getElementById('pomModeLabel');
      if(ml)ml.textContent=pomCycles%4===0?'🌙 Long Break':'☕ Short Break';
    } else {
      pomMode='work';pomSecs=POM_WORK;
      const ml=document.getElementById('pomModeLabel');
      if(ml)ml.textContent='🍅 Focus Time';
      toast('Break over — time to focus!');
    }
    const btn=document.getElementById('pomStartBtn');
    if(btn){btn.textContent='▶ Start';btn.onclick=startPom;}
  }
}

  if(!words.length){el.innerHTML='<div class="empty"><div class="big">📖</div>No words match — add your first one!</div>';return;}

  fcDeck=S.words.filter(w=>(!lang||w.language===lang)&&(!mastery||w.mastery===mastery)).sort(()=>Math.random()-0.5);
  fcIdx=0;
  if(!fcDeck.length){document.getElementById('fcArea').innerHTML='<div class="fc-empty">No words match. Add some words in the Vocabulary tab first!</div>';return;}
  showCard();
}
function showCard(){
  const el=document.getElementById('fcArea');if(!el)return;
  if(fcIdx>=fcDeck.length){el.innerHTML=`<div class="fc-done"><span class="big">✦</span><p>Session complete! ${fcDeck.length} cards reviewed.</p><button class="btn" style="margin-top:18px" onclick="startFC()">Go again</button></div>`;return;}
  const w=fcDeck[fcIdx];
  el.innerHTML=`<div class="fc-wrap">
    <div class="fc-prog">${fcIdx+1} / ${fcDeck.length}</div>
    <div class="fc-card" id="fcCard" onclick="flipCard()">
      <div class="fc-hint">Tap to reveal meaning</div>
      <div class="fc-word">${w.word}</div>
      <div class="fc-meaning">${w.meaning}</div>
      ${w.pronunciation?`<div class="fc-pronun">${w.pronunciation}</div>`:''}
    </div>
    <div class="fc-btns" id="fcBtns" style="display:none">
      <button class="fc-btn wrong" onclick="fcAns(false)">✕ Didn't know</button>
      <button class="fc-btn right" onclick="fcAns(true)">✓ Got it</button>
    </div>
  </div>`;
}
function flipCard(){snd('flip');document.getElementById('fcCard')?.classList.add('flipped');const b=document.getElementById('fcBtns');if(b)b.style.display='flex';}
async function fcAns(correct){
  const w=fcDeck[fcIdx],levels=['New','Learning','Reviewing','Mastered'];
  let idx=levels.indexOf(w.mastery);
  if(correct&&idx<3)idx++;else if(!correct&&idx>0)idx--;
  const newM=levels[idx];
  try{await sb.from('sanctum_words').update({mastery:newM}).eq('id',w.id);}catch(e){}
  const sw=S.words.find(x=>x.id===w.id);if(sw)sw.mastery=newM;
  if(correct&&newM==='Mastered'){S.xp+=5;todayXP+=5;snd('quest');xpPop('+5 XP',window.innerWidth/2,200);toast('+5 XP — word mastered! ✨');await save();}
  else if(correct)snd('xp');
  fcIdx++;showCard();
}

function updateReaderSidebar(){
  const side=document.getElementById('qrSide');if(!side)return;

}
function updateReaderMain(){
  const main=document.getElementById('qrMain');if(!main)return;
  if(!currentSurahNum){main.innerHTML='<div class="qr-empty">Select a surah from the list to begin reading ✦</div>';return;}
  const s=SURAHS.find(x=>x.num===currentSurahNum);
  const p=S.quranProgress[currentSurahNum]||{};
  const cached=surahCache[currentSurahNum];
  let body;
  if(!cached){
    body=surahLoading
      ?'<div class="qr-empty">Loading surah text… ✦</div>'
      :`<div class="qr-empty">Could not load this surah.<br><span style="cursor:pointer;color:var(--gold2)" onclick="selectSurah(${currentSurahNum})">Try again</span></div>`;
  } else {
    const ann=S.quranAnnotations[currentSurahNum]||{};
    body=cached.ar.map((a,i)=>{
      const en=cached.en[i]?.text||'';
      const an=ann[a.numberInSurah]||{};
      const hl=an.color?'hl-'+an.color:'';
      const dot=(c)=>`<div class="ayah-dot c-${c} ${an.color===c?'active':''}" title="${c}" onclick="setAyahColor(${currentSurahNum},${a.numberInSurah},'${c}')"></div>`;
      return `<div class="ayah-block ${hl}">
        <div class="ayah-top">
          <div class="ayah-num">${a.numberInSurah}</div>
          <div class="ayah-ar">${a.text}</div>
          <div class="ayah-tools">
            ${dot('yellow')}${dot('green')}${dot('red')}
            <button class="ayah-notebtn" onclick="openAyahNote(${currentSurahNum},${a.numberInSurah})" title="Note">📝</button>
          </div>
        </div>
        <div class="ayah-en">${en}</div>
        ${an.note?`<div class="ayah-note">📝 ${an.note.replace(/</g,'&lt;')}</div>`:''}
      </div>`;
    }).join('');
  }
  main.innerHTML=`
    <div class="qr-head">
      <div>
        <div class="qr-title">${s.num}. ${s.name}</div>
        <div class="qr-title-ar">${s.ar} · ${s.v} verses · Juz ${s.juz}</div>
      </div>
      <div class="qr-checks">
        <div class="schk" onclick="toggleSurah(${s.num},'canRead')"><div class="schk-box ${p.canRead?'on':''}">✓</div><div class="schk-lbl">Read</div></div>
        <div class="schk" onclick="toggleSurah(${s.num},'canRecite')"><div class="schk-box ${p.canRecite?'on':''}">✓</div><div class="schk-lbl">Memory</div></div>
        <div class="schk" onclick="toggleSurah(${s.num},'understand')"><div class="schk-box ${p.understand?'on':''}">✓</div><div class="schk-lbl">Meaning</div></div>
      </div>
    </div>
    <p style="font-size:0.72em;color:var(--muted);margin-bottom:14px;font-style:italic">Click a dot to highlight an ayah yellow, green or red. Click 📝 to add a note.</p>
    ${body}`;
}
function selectSurah(num){
  currentSurahNum=num;
  updateReaderSidebar();
  updateReaderMain();
  if(!surahCache[num]&&!surahLoading){
    surahLoading=true;
    updateReaderMain();
    fetch(`https://api.alquran.cloud/v1/surah/${num}/editions/quran-uthmani,en.sahih`)
      .then(r=>r.json())
      .then(data=>{
        surahLoading=false;
        if(data&&data.data&&data.data.length===2){
          surahCache[num]={ar:data.data[0].ayahs,en:data.data[1].ayahs};
        }
        if(currentSurahNum===num)updateReaderMain();
      })
      .catch(()=>{surahLoading=false;if(currentSurahNum===num)updateReaderMain();});
  }
}
function setAyahColor(num,ayahNum,color){
  if(!S.quranAnnotations[num])S.quranAnnotations[num]={};
  if(!S.quranAnnotations[num][ayahNum])S.quranAnnotations[num][ayahNum]={color:null,note:''};
  const cur=S.quranAnnotations[num][ayahNum].color;
  S.quranAnnotations[num][ayahNum].color=(cur===color)?null:color;
  snd('click');
  save();
  updateReaderMain();
}
function openAyahNote(num,ayahNum){
  const cur=S.quranAnnotations?.[num]?.[ayahNum]?.note||'';
  openModal('ayahNote',`
    <div class="modal-title">📝 Note — Surah ${num}, Ayah ${ayahNum}</div>
    <label class="mlabel">Your note</label>
    <textarea id="ayahNoteInput" class="minput" rows="4" placeholder="Write a note about this ayah...">${cur.replace(/</g,'&lt;')}</textarea>

      <button class="btn ghost" onclick="closeModal()">Cancel</button>
      <button class="btn" onclick="saveAyahNote(${num},${ayahNum})">Save Note ✓</button>
    </div>`);
}
async function saveAyahNote(num,ayahNum){
  const v=document.getElementById('ayahNoteInput')?.value?.trim()||'';
  if(!S.quranAnnotations[num])S.quranAnnotations[num]={};
  if(!S.quranAnnotations[num][ayahNum])S.quranAnnotations[num][ayahNum]={color:null,note:''};
  S.quranAnnotations[num][ayahNum].note=v;
  await save();
  closeModal();
  updateReaderMain();
  toast('📝 Note saved');
}

async function saveLanguage(){
  const f=document.getElementById('lFlag').value.trim()||'🌐';
  const n=document.getElementById('lName').value.trim();
  const unlockXp=parseInt(document.getElementById('lXp').value)||0;
  if(!n){toast('Name required!');return;}
  S.c.languages.push({f,n,unlockXp});
  await save();closeModal();go('dashboard');toast('🗺️ Language added!');
}
async function delLanguage(i){
  S.c.languages.splice(i,1);
  await save();go('dashboard');toast('Language removed');
}

// ── MODAL ──
function openModal(id,html){
  document.getElementById('modalOverlay').classList.remove('hidden');
  document.getElementById('modalBox').innerHTML=html;
}
function closeModal(){document.getElementById('modalOverlay').classList.add('hidden');}

// ── EDIT MODE ──
function toggleEdit(){
  editMode=!editMode;
  document.body.classList.toggle('edit',editMode);
  const btn=document.getElementById('editBtn');
  btn.textContent=editMode?'✓ Done':'✏️ Edit';
  btn.classList.toggle('on',editMode);
  if(editMode)toast('✏️ Click anything to edit it');
  else toast('✓ Changes saved');
  go(currentPage);
}

function openEditPop(e,label,cur,onSave){
  document.getElementById('epop')?.remove();
  const pop=document.createElement('div');
  pop.id='epop';pop.className='epop';
  const x=Math.min(e.clientX,window.innerWidth-310),y=Math.min(e.clientY,window.innerHeight-140);
  pop.style.cssText=`left:${x}px;top:${y}px`;
  pop.innerHTML=`<div class="epop-lbl">${label}</div>
    <input id="epopInput" class="epop-input" value="${(cur||'').replace(/"/g,'&quot;').replace(/</g,'&lt;')}">
    <div class="epop-btns">
      <button class="epop-cancel" onclick="document.getElementById('epop').remove()">Cancel</button>
      <button class="epop-save" onclick="commitEpop()">Save ✓</button>
    </div>`;
  document.body.appendChild(pop);
  document.getElementById('epopInput').focus();
  document.getElementById('epopInput').select();
  window._epopSave=onSave;
  document.getElementById('epopInput').onkeydown=e=>{
    if(e.key==='Enter')commitEpop();
    if(e.key==='Escape')pop.remove();
  };
}
function commitEpop(){
  const v=document.getElementById('epopInput')?.value?.trim();
  document.getElementById('epop')?.remove();
  if(v!==undefined&&window._epopSave)window._epopSave(v);
}

function openImgPicker(key){
  openModal('imgPick',`
    <div class="modal-title">🖼️ Change Image</div>
    <label class="mlabel">Paste any image URL</label>
    <input id="imgUrl" class="minput" placeholder="https://..." value="${S.c[key]||''}" oninput="prevImg()">
    <p style="font-size:0.72em;color:var(--muted);font-style:italic;margin-top:4px">Right-click any image online (Unsplash, Pinterest, Google Images…) → Copy image address, then paste it above.</p>
    <label class="mlabel">Or upload a photo from your device</label>
    <input id="imgFile" type="file" accept="image/*" class="minput" style="padding:7px" onchange="handleImgFile(event)">
    <div id="imgFileStatus" style="font-size:0.7em;color:var(--gold2);margin-top:4px"></div>
    <div style="margin:10px 0 4px;font-size:0.65em;color:var(--muted);letter-spacing:1px;text-transform:uppercase">Preview</div>
    <img id="imgPrev" src="${S.c[key]||''}" style="width:100%;max-height:150px;object-fit:cover;border:1px solid var(--border2);border-radius:2px;${S.c[key]?'':'display:none'};margin-bottom:8px" onerror="this.style.display='none'">
    <div class="mbtns">
      <button class="btn ghost" onclick="closeModal()">Cancel</button>
      <button class="btn" onclick="saveImg('${key}')">Set Image ✓</button>
    </div>`);
}
function prevImg(){const u=document.getElementById('imgUrl')?.value;const p=document.getElementById('imgPrev');if(p&&u){p.src=u;p.style.display='block';}}
function handleImgFile(e){
  const file=e.target.files[0];
  if(!file)return;
  const status=document.getElementById('imgFileStatus');
  if(status)status.textContent='Processing photo…';
  const reader=new FileReader();
  reader.onload=(ev)=>{
    const img=new Image();
    img.onload=()=>{
      const maxDim=900;
      let w=img.width,h=img.height;
      if(w>maxDim||h>maxDim){
        if(w>=h){h=Math.round(h*(maxDim/w));w=maxDim;}
        else{w=Math.round(w*(maxDim/h));h=maxDim;}
      }
      const canvas=document.createElement('canvas');
      canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      const dataUrl=canvas.toDataURL('image/jpeg',0.82);
      const urlInput=document.getElementById('imgUrl');
      if(urlInput)urlInput.value=dataUrl;
      prevImg();
      const kb=Math.round(dataUrl.length*0.75/1024);
      if(status)status.textContent=`📷 Photo ready (~${kb} KB) — click "Set Image" to save`;
    };
    img.onerror=()=>{if(status)status.textContent='Could not read that image file.';};
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
}
async function saveImg(key){
  const u=document.getElementById('imgUrl')?.value?.trim();
  if(!u){toast('Please enter a URL');return;}
  S.c[key]=u;await save();closeModal();applyCustom();go(currentPage);toast('✦ Image updated!');
}
</script>
