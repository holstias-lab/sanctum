<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nhoma — Profile</title>
<script>(function(){try{var s=JSON.parse(localStorage.getItem('sanctum_state_v1')||'{}');document.documentElement.setAttribute('data-theme',(s.profile&&s.profile.theme)||'sage');}catch(e){}})();</script>
<link rel="stylesheet" href="assets/css/sanctum.css">
<style>
.ring{position:relative;width:120px;height:120px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto}
.ring span{font-family:'Fraunces',serif;font-weight:700;font-size:22px}
</style>
</head>
<body data-page="profile">
<main class="main">
  <header class="page-header">
    <div class="page-header-left">
      <div class="avatar-ring" style="width:96px;height:96px">
        <img id="hdr-avatar" src="" alt="Avatar">
      </div>
      <div>
        <h2 class="headline-lg" id="p-name">Scholar</h2>
        <div class="flex gap-1 mt-1">
          <span class="badge badge-primary" id="p-rank"></span>
          <span class="badge badge-muted" id="p-level"></span>
          <span class="badge badge-new" id="p-streak"></span>
        </div>
      </div>
    </div>
    <a href="settings.html" class="btn btn-outline">Edit Profile</a>
  </header>

  <div class="grid">
    <section class="col-8">
      <div class="card">
        <div class="card-header"><h3>Linguistic Journey</h3></div>
        <div id="lang-rings" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:var(--inner-gap)"></div>
      </div>
    </section>
    <section class="col-4">
      <div class="card mb-2">
        <div class="card-header"><h3 style="font-size:18px">Academic Stats</h3></div>
        <div class="grid" style="gap:8px">
          <div class="col-6 stat-tile"><div class="num" id="stat-xp">0</div><div class="lbl">Total XP</div></div>
          <div class="col-6 stat-tile"><div class="num" id="stat-words">0</div><div class="lbl">Words Mastered</div></div>
          <div class="col-6 stat-tile"><div class="num" id="stat-surahs">0</div><div class="lbl">Surahs</div></div>
          <div class="col-6 stat-tile"><div class="num" id="stat-hours">0h</div><div class="lbl">Studied</div></div>
        </div>
      </div>
      <div class="card">
        <div class="flex justify-between items-center mb-1"><span class="label-md">Next Level</span><span class="label-sm text-muted" id="next-xp"></span></div>
        <div class="progress-track"><div class="progress-fill" id="level-bar" style="width:0%"></div></div>
        <p class="text-muted body-md mt-2" style="font-style:italic">"Success is the sum of small efforts repeated day in and day out."</p>
      </div>
    </section>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase-client.js"></script>
<script src="assets/js/auth.js"></script>
<script src="assets/js/state.js"></script>
<script src="assets/js/nav.js"></script>
<script>
const s = Sanctum.state;
document.getElementById('hdr-avatar').src = s.profile.avatar;
document.getElementById('p-name').textContent = s.profile.name;
document.getElementById('p-rank').textContent = Sanctum.currentRank().name;
document.getElementById('p-level').textContent = 'Level ' + Sanctum.level();
document.getElementById('p-streak').textContent = s.profile.streak + ' Day Streak';

function renderRings() {
  document.getElementById('lang-rings').innerHTML = s.languages.map(l => {
    const pct = Math.round((l.progress || 0) * 100);
    const color = pct >= 70 ? 'var(--primary)' : pct >= 30 ? 'var(--secondary)' : 'var(--tertiary)';
    return `<div style="text-align:center;position:relative">
      ${l.custom ? `<span class="material-symbols-outlined" style="position:absolute;top:-4px;right:12px;font-size:16px;color:var(--on-surface-variant);cursor:pointer" onclick="removeCustomLanguage('${l.code}')">close</span>` : ''}
      <div class="ring" style="background:conic-gradient(${color} ${pct * 3.6}deg, var(--surface-nested-low) 0deg)">
        <div style="width:96px;height:96px;border-radius:50%;background:var(--surface-card);display:flex;align-items:center;justify-content:center"><span>${pct}%</span></div>
      </div>
      <p class="body-md mt-1" style="font-weight:700">${l.name}</p>
      <p class="label-sm text-muted">${l.unlocked ? (pct >= 70 ? 'Advanced' : pct >= 30 ? 'Intermediate' : 'Novice') : 'Locked'}</p>
    </div>`;
  }).join('') + `<div style="text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;cursor:pointer" onclick="addLanguageFromProfile()">
    <div class="ring" style="background:var(--surface-nested-low);display:flex;align-items:center;justify-content:center;width:96px;height:96px">
      <span class="material-symbols-outlined" style="font-size:32px;color:var(--on-surface-variant)">add</span>
    </div>
    <p class="body-md" style="font-weight:700;color:var(--on-surface-variant)">Add New Language</p>
  </div>`;
}
renderRings();

function addLanguageFromProfile() {
  const name = prompt('What language do you want to add?');
  if (!name) return;
  const lang = Sanctum.addLanguage(name);
  if (lang) { Sanctum.toast(name + ' added'); renderRings(); }
}
function removeCustomLanguage(code) {
  if (!confirm('Remove this language from your profile?')) return;
  Sanctum.removeLanguage(code);
  renderRings();
}

document.getElementById('stat-xp').textContent = s.profile.totalXp.toLocaleString();
document.getElementById('stat-words').textContent = s.vocab.filter(w => (w.mastery || 0) >= 80).length;
document.getElementById('stat-surahs').textContent = s.quranProgress.surahsCompleted.length;
const totalMin = s.sessions.reduce((acc, sess) => acc + (sess.durationMin || 0), 0);
document.getElementById('stat-hours').textContent = Math.round(totalMin / 60 * 10) / 10 + 'h';

const nextR = Sanctum.nextRank();
if (nextR) {
  document.getElementById('next-xp').textContent = `${s.profile.totalXp} / ${nextR.xp} XP`;
  document.getElementById('level-bar').style.width = Math.min(100, (s.profile.totalXp / nextR.xp) * 100) + '%';
} else {
  document.getElementById('next-xp').textContent = 'Max rank reached';
  document.getElementById('level-bar').style.width = '100%';
}
</script>
</body>
</html>
