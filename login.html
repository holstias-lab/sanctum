<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nhoma — Sign In</title>
<script>(function(){try{var s=JSON.parse(localStorage.getItem('sanctum_state_v1')||'{}');document.documentElement.setAttribute('data-theme',(s.profile&&s.profile.theme)||'sage');}catch(e){}})();</script>
<link rel="stylesheet" href="assets/css/sanctum.css">
<style>
body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.auth-card{width:100%;max-width:400px;background:var(--surface-card);border:1px solid rgba(141,147,135,0.15);border-radius:var(--radius-card);padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.4)}
.auth-input{width:100%;padding:12px 16px;margin-bottom:12px;border-radius:var(--radius-full);border:1px solid rgba(141,147,135,.3);background:var(--surface-nested-low);color:var(--on-surface);font-size:14px}
.auth-tabs{display:flex;background:var(--surface-nested-low);border-radius:var(--radius-full);padding:4px;margin-bottom:24px}
.auth-tab{flex:1;text-align:center;padding:10px;border-radius:var(--radius-full);font-weight:700;font-size:14px;color:var(--on-surface-variant)}
.auth-tab.active{background:var(--primary);color:var(--on-primary)}
.auth-err{color:var(--tertiary);font-size:13px;margin-top:8px;min-height:18px}
</style>
</head>
<body>
<div class="auth-card">
  <div style="text-align:center;margin-bottom:24px">
    <h1 class="display-lg" style="font-size:36px;color:var(--sage-glow)">Nhoma</h1>
    <p class="text-muted body-md mt-1">Your sanctuary for language and Quranic study.</p>
  </div>
  <div class="auth-tabs">
    <button class="auth-tab active" id="tab-signin" onclick="switchMode('signin')">Sign In</button>
    <button class="auth-tab" id="tab-signup" onclick="switchMode('signup')">Sign Up</button>
  </div>
  <input type="email" id="in-email" class="auth-input" placeholder="Email" autocomplete="email">
  <input type="password" id="in-password" class="auth-input" placeholder="Password" autocomplete="current-password">
  <button class="btn btn-primary" style="width:100%;justify-content:center" id="submit-btn" onclick="submitForm()">Sign In</button>
  <p class="auth-err" id="auth-err"></p>
  <div class="flex items-center gap-2 my-3">
    <div style="flex:1;height:1px;background:rgba(141,147,135,.25)"></div>
    <span class="label-sm text-muted">OR</span>
    <div style="flex:1;height:1px;background:rgba(141,147,135,.25)"></div>
  </div>
  <button class="btn btn-outline" style="width:100%;justify-content:center" onclick="signInWithGoogle()">
    <svg width="16" height="16" viewBox="0 0 48 48" style="flex-shrink:0">
      <path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.7 32.9 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.1 8 3l6-6C34.5 5.1 29.5 3 24 3 12.4 3 3 12.4 3 24s9.4 21 21 21 21-9.4 21-21c0-1.4-.1-2.4-.4-3.5z"/>
      <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.6 15.9 18.9 13 24 13c3.1 0 5.8 1.1 8 3l6-6C34.5 6.1 29.5 4 24 4 16.3 4 9.6 8.3 6.3 14.7z"/>
      <path fill="#4CAF50" d="M24 44c5.2 0 10-2 13.6-5.2l-6.3-5.3C29.3 35.5 26.8 36.4 24 36.4c-5.3 0-9.7-3.5-11.3-8.3l-6.5 5C9.5 39.6 16.2 44 24 44z"/>
      <path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.3-2.3 4.3-4.1 5.7l6.3 5.3C41.5 35.8 44 30.4 44 24c0-1.4-.1-2.4-.4-3.5z"/>
    </svg>
    Continue with Google
  </button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase-client.js"></script>
<script src="assets/js/auth.js"></script>
<script>
let mode = 'signin';
function switchMode(m) {
  mode = m;
  document.getElementById('tab-signin').classList.toggle('active', m === 'signin');
  document.getElementById('tab-signup').classList.toggle('active', m === 'signup');
  document.getElementById('submit-btn').textContent = m === 'signin' ? 'Sign In' : 'Create Account';
  document.getElementById('auth-err').textContent = '';
}

async function submitForm() {
  const email = document.getElementById('in-email').value.trim();
  const password = document.getElementById('in-password').value;
  const errEl = document.getElementById('auth-err');
  errEl.textContent = '';
  if (!email || !password) { errEl.textContent = 'Enter an email and password.'; return; }
  if (password.length < 6) { errEl.textContent = 'Password must be at least 6 characters.'; return; }

  document.getElementById('submit-btn').textContent = 'Please wait…';
  try {
    let result;
    if (mode === 'signup') {
      result = await sbClient.auth.signUp({ email, password });
    } else {
      result = await sbClient.auth.signInWithPassword({ email, password });
    }
    if (result.error) {
      errEl.textContent = result.error.message;
      document.getElementById('submit-btn').textContent = mode === 'signin' ? 'Sign In' : 'Create Account';
      return;
    }
    if (mode === 'signup' && !result.data.session) {
      errEl.style.color = 'var(--primary)';
      errEl.textContent = 'Check your email to confirm your account, then sign in.';
      switchMode('signin');
      return;
    }
    sessionStorage.removeItem('sanctum_synced');
    const params = new URLSearchParams(location.search);
    location.href = params.get('redirect') || 'index.html';
  } catch (e) {
    errEl.textContent = 'Something went wrong. Please try again.';
    document.getElementById('submit-btn').textContent = mode === 'signin' ? 'Sign In' : 'Create Account';
  }
}

document.getElementById('in-password').addEventListener('keydown', e => { if (e.key === 'Enter') submitForm(); });

async function signInWithGoogle() {
  const params = new URLSearchParams(location.search);
  const target = params.get('redirect') || 'index.html';
  const redirectTo = new URL(target, location.href).href;
  const errEl = document.getElementById('auth-err');
  const { error } = await sbClient.auth.signInWithOAuth({ provider: 'google', options: { redirectTo } });
  if (error) errEl.textContent = error.message;
}

(async () => {
  const session = await getSession();
  if (session) location.href = 'index.html';
})();
</script>
</body>
</html>
