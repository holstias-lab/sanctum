<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>ab test</title></head>
<body style="font-family:sans-serif;max-width:500px;margin:40px auto">
<p>Click each button below (they all say the Arabic word for "hello"). Tell me the <b>number</b> of any button that sounds like actual robotic speech instead of noise/static/a drone.</p>
<div id="buttons"></div>
<pre id="log"></pre>
<script src="assets/vendor/espeakng/espeakng.min.js"></script>
<script>
let tts, audioCtx;
function log(m){document.getElementById('log').textContent += m + '\n';}

function playBuffer(float32arr, sampleRate) {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const buf = audioCtx.createBuffer(1, float32arr.length, sampleRate);
  buf.copyToChannel(float32arr, 0);
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  src.connect(audioCtx.destination);
  src.start();
}

async function getRawChunks(text, voiceId) {
  if (!tts) {
    tts = await new Promise((resolve, reject) => {
      try { const t = new eSpeakNG('assets/vendor/espeakng/espeakng.worker.js', () => resolve(t)); }
      catch(e){ reject(e); }
    });
  }
  await new Promise(resolve => tts.set_voice(voiceId, resolve));
  const chunks = [];
  await new Promise(resolve => {
    tts.synthesize(text, (wav) => {
      if (wav && wav.byteLength) chunks.push(wav);
      else resolve();
    });
  });
  return chunks; // array of raw ArrayBuffers
}

function concatBuffers(buffers) {
  let total = 0;
  buffers.forEach(b => total += b.byteLength);
  const out = new Uint8Array(total);
  let off = 0;
  buffers.forEach(b => { out.set(new Uint8Array(b), off); off += b.byteLength; });
  return out.buffer;
}

async function testMode(mode) {
  log('--- testing: ' + mode + ' ---');
  const chunks = await getRawChunks('مرحبا', 'sem/ar');
  const raw = concatBuffers(chunks);

  if (mode === 'int16_22050') {
    const i16 = new Int16Array(raw);
    const f32 = new Float32Array(i16.length);
    for (let i=0;i<i16.length;i++) f32[i] = i16[i]/32768;
    playBuffer(f32, 22050);
  } else if (mode === 'int16_11025') {
    const i16 = new Int16Array(raw);
    const f32 = new Float32Array(i16.length);
    for (let i=0;i<i16.length;i++) f32[i] = i16[i]/32768;
    playBuffer(f32, 11025);
  } else if (mode === 'float32_22050') {
    const f32src = new Float32Array(raw);
    playBuffer(f32src, 22050);
  } else if (mode === 'int16_stereo_extract_right_22050') {
    const i16 = new Int16Array(raw);
    const n = Math.floor(i16.length/2);
    const f32 = new Float32Array(n);
    for (let i=0;i<n;i++) f32[i] = i16[i*2+1]/32768;
    playBuffer(f32, 22050);
  } else if (mode === 'int16_stereo_extract_right_11025') {
    const i16 = new Int16Array(raw);
    const n = Math.floor(i16.length/2);
    const f32 = new Float32Array(n);
    for (let i=0;i<n;i++) f32[i] = i16[i*2+1]/32768;
    playBuffer(f32, 11025);
  } else if (mode === 'int16_dedup2_22050') {
    // undo apparent 2x sample duplication, keep every other sample
    const i16 = new Int16Array(raw);
    const n = Math.floor(i16.length/2);
    const f32 = new Float32Array(n);
    for (let i=0;i<n;i++) f32[i] = i16[i*2]/32768;
    playBuffer(f32, 22050);
  }
  log('played ' + mode);
}

['int16_22050','int16_11025','float32_22050','int16_stereo_extract_right_22050','int16_stereo_extract_right_11025','int16_dedup2_22050'].forEach((mode, i) => {
  const btn = document.createElement('button');
  btn.textContent = (i+1) + '. ' + mode;
  btn.style.display = 'block';
  btn.style.margin = '8px 0';
  btn.style.padding = '10px';
  btn.style.width = '100%';
  btn.style.fontSize = '16px';
  btn.onclick = () => testMode(mode);
  document.getElementById('buttons').appendChild(btn);
});
</script>
</body></html>
